version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Group minor and patch bumps so we get one PR per ecosystem cluster
      # instead of one per package.
      next-stack:
        patterns:
          - "next"
          - "eslint-config-next"
        update-types:
          - minor
          - patch
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "@testing-library/*"
          - "msw"
          - "jsdom"
        update-types:
          - minor
          - patch
      lint-and-format:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "prettier-*"
          - "lint-staged"
          - "husky"
        update-types:
          - minor
          - patch
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "prettier-plugin-tailwindcss"
          - "tw-animate-css"
        update-types:
          - minor
          - patch
      types:
        patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
      patch-all:
        patterns:
          - "*"
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
