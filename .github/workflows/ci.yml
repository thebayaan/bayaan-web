name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, format, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Unit + integration tests
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Next build + prod smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_BAYAAN_API_URL: https://api.example.invalid
      BAYAAN_INTERNAL_API_URL: https://api.internal.example.invalid
      BAYAAN_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Production smoke test
        run: |
          npx next start -p 3000 &
          SERVER_PID=$!
          # Wait for server to accept connections
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server responding on /"
              break
            fi
            sleep 1
          done
          # Verify key routes return 200
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/ | grep -q 200 || { echo "::error::/ returned non-200"; kill $SERVER_PID; exit 1; }
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/quran | grep -q 200 || { echo "::error::/quran returned non-200"; kill $SERVER_PID; exit 1; }
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/favicon.ico | grep -q 200 || { echo "::error::/favicon.ico returned non-200"; kill $SERVER_PID; exit 1; }
          echo "Smoke test passed"
          kill $SERVER_PID

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_BAYAAN_API_URL: https://api.example.invalid
      BAYAAN_INTERNAL_API_URL: https://api.internal.example.invalid
      BAYAAN_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
