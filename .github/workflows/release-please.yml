name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4.4.1
        with:
          # Use a config file rather than inline so the changelog format and
          # the list of release types stays version-controlled and reviewable.
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json
